[package]
org = "ballerinax"
name = "ballerina_fhir_server"
version = "1.0.0"
distribution = "2201.12.10"
authors = ["Ballerina"]
keywords = ["Healthcare", "FHIR", "r4"]
template = true

[build-options]
observabilityIncluded = true

[[platform.java21.dependency]]
artifactId = "h2"
version = "2.3.232"
groupId = "com.h2database"

[[platform.java21.dependency]]
artifactId = "postgresql"
version = "42.7.9"
groupId = "org.postgresql"

[[dependency]]
name = "sql_on_fhir_lib"
org = "mahima_de_silva"
repository = "local"
version = "0.1.0"

[[dependency]]
name = "sof_postgres"
org = "mahima_de_silva"
repository = "local"
version = "0.1.0"